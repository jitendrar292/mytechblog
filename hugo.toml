baseURL = "https://jitendrar292.github.io/mytechblog/"
languageCode = "en-us"
title = "Jitendra Rawat's Tech Blog"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "Software Engineer | System Design Enthusiast | AI-powered Developer Tooling"
  author = "Jitendra Rawat"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Hey there, I'm Jitendra Rawat! 👋"
    Content = "🚀 Software Engineer | 🧠 System Design Enthusiast — I write about **Software Architecture**, **AI-powered Development**, **Kafka**, **Spring Boot**, and building **scalable backend systems**."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jitendrar292"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/jitendrar-singh-rawat/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
